<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <? var gClientId = getGoogleClientIdSafe(); ?>
    <style>
      body { background-color: #f9fafb; }
    </style>
  </head>
  <body class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border border-gray-100">
      <div class="text-center mb-6">
        <h2 class="text-2xl font-extrabold text-gray-900">Login Hub</h2>
        <p class="text-gray-500 mt-2 text-sm">Pilih metode login untuk melanjutkan</p>
      </div>

      <? if (error) { ?>
        <div class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 mb-6 text-sm flex items-center" role="alert">
          <svg class="h-4 w-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
          <span><?= error ?></span>
        </div>
      <? } ?>

      <? if (gClientId) { ?>
      <a href="<?= googleAuthUrl ?>" 
         class="flex items-center justify-center w-full border-2 border-gray-200 rounded-xl py-3 hover:bg-gray-50 transition-colors mb-4 no-underline">
        <img src="https://developers.google.com/identity/images/g-logo.png" class="w-5 h-5 mr-3" alt="Google">
        <span class="font-medium text-gray-700">Sign in with Google</span>
      </a>
      <div class="flex items-center my-5">
        <hr class="flex-grow border-gray-200">
        <span class="px-3 text-xs text-gray-400 uppercase tracking-wider">atau</span>
        <hr class="flex-grow border-gray-200">
      </div>
      <? } ?>

      <!-- WhatsApp OTP Form -->
      <form action="<?= ScriptApp.getService().getUrl() ?>" method="POST" id="loginForm">
        <input type="hidden" name="action" value="send_otp">
        <input type="hidden" name="redirect" value="<?= redirect || '' ?>">

        <div class="mb-6">
          <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Nomor WhatsApp/HP</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500 font-medium">+</span>
            <input type="tel" name="phone" placeholder="62812345678"
                   class="w-full pl-7 pr-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 transition-colors"
                   pattern="[0-9]+"
                   required>
          </div>
          <p class="mt-2 text-[10px] text-gray-400 italic">*Gunakan kode negara tanpa tanda plus (contoh: 62812...)</p>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition duration-300 transform active:scale-[0.98]">
          Kirim OTP
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-xs text-gray-400">&copy; 2026 Auth Hub</p>
      </div>
    </div>

    <script>
      document.getElementById('loginForm').addEventListener('submit', function() {
        var btn = this.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Memproses...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
      });
    </script>
  </body>
</html>
