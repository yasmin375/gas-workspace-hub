name: Auto Merge Devin PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    if: github.actor == 'devin-ai-integration[bot]'
    permissions:
      pull-requests: write
    steps:
      - name: Auto approve
        uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    runs-on: ubuntu-latest
    needs: auto-approve
    if: |
      github.actor == 'devin-ai-integration[bot]' &&
      !contains(github.event.pull_request.title, '[HIGH-RISK]')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check changed files
        id: changed
        uses: dorny/paths-filter@v3
        with:
          filters: |
            high_risk:
              - 'Auth.gs'
              - 'GoogleAuth.gs'
              - 'Code.gs'
              - 'Session.gs'
              - 'AdminAPI.gs'
              - 'Setup.gs'
              - 'lib/gas-auth-lib/**'
              - 'appsscript.json'
              - '.github/**'

      - name: Auto merge (only if no high-risk files changed)
        if: steps.changed.outputs.high_risk == 'false'
        uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: ""
